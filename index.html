<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Current Affairs</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

<!-- BREAKING NEWS TICKER -->
<div class="ticker-wrap">
  <span class="ticker-label">🔴 BREAKING</span>
  <div class="ticker-track">
    <div class="ticker-content" id="tickerContent">Loading headlines...</div>
  </div>
</div>

<header>
  <div class="header-top">
    <div class="logo">Current<span>Affairs</span></div>
    <div class="header-right">
      <div class="date-bar" id="dateBar"></div>
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙 Dark Mode</button>
    </div>
  </div>
  <nav id="tabNav"></nav>
</header>

<div class="layout">
  <main id="mainContent">
    <div class="loader-wrap"><div class="spinner"></div><p>Loading news...</p></div>
  </main>

  <aside class="sidebar">
    <div class="sidebar-search-box">
      <h3 class="sidebar-title">🔍 Search News</h3>
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="Search any topic..." />
        <button id="searchBtn">Search</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <div class="sidebar-trending">
      <h3 class="sidebar-title">🔥 Trending Topics</h3>
      <div class="trending-tags">
        <span class="tag" onclick="doSearch('Modi')">Modi</span>
        <span class="tag" onclick="doSearch('IPL')">IPL</span>
        <span class="tag" onclick="doSearch('Stock Market')">Stock Market</span>
        <span class="tag" onclick="doSearch('AI')">AI</span>
        <span class="tag" onclick="doSearch('Bollywood')">Bollywood</span>
        <span class="tag" onclick="doSearch('Cricket')">Cricket</span>
        <span class="tag" onclick="doSearch('Startup')">Startup</span>
        <span class="tag" onclick="doSearch('Climate')">Climate</span>
      </div>
    </div>
  </aside>
</div>

<footer>
  &copy; 2026 <strong>Current Affairs</strong> — Powered by NewsAPI
</footer>

<script src="index.js"></script>
</body>
</html>
